name: Benchmark

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  compare:
    name: Base vs candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Select baseline revision
        id: baseline
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            baseline="${PR_BASE_SHA}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            baseline="${PUSH_BEFORE_SHA}"
          else
            baseline=""
          fi

          if [[ -z "${baseline}" || "${baseline}" =~ ^0+$ ]]; then
            baseline="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          echo "sha=${baseline}" >> "${GITHUB_OUTPUT}"

      - name: Checkout baseline
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.baseline.outputs.sha }}
          path: .benchmark-baseline
          persist-credentials: false

      - name: System dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1
        with:
          packages: clang libclang-dev llvm libncurses-dev build-essential libreadline-dev
          version: 1.0

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.91"

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: benchmark
          workspaces: |
            . -> target
            .benchmark-baseline -> target

      - name: Build candidate and benchmark harness
        run: cargo build --release --locked -p graft-tool -p graft-bench

      - name: Build baseline
        working-directory: .benchmark-baseline
        run: cargo build --release --locked -p graft-tool

      - name: Run interleaved benchmarks
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: |
          mkdir -p target/benchmark
          ./target/release/graft-bench run-paired \
            --baseline-graft-bin ./.benchmark-baseline/target/release/graft \
            --candidate-graft-bin ./target/release/graft \
            --baseline-output target/benchmark/baseline.json \
            --candidate-output target/benchmark/candidate.json \
            --baseline-label "${BASELINE_SHA}" \
            --candidate-label "${GITHUB_SHA}" \
            --profile ci \
            --samples 6 \
            --warmups 1

      - name: Compare results
        run: |
          ./target/release/graft-bench compare \
            --baseline target/benchmark/baseline.json \
            --candidate target/benchmark/candidate.json \
            --output target/benchmark/comparison.md
          cat target/benchmark/comparison.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-${{ github.run_id }}
          path: |
            target/benchmark/baseline.json
            target/benchmark/candidate.json
            target/benchmark/comparison.md
          if-no-files-found: warn
          retention-days: 30
